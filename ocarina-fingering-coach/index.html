<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오카리나 운지 코치</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%230b7f7a'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-size='18' font-family='Arial' font-weight='800' fill='white'%3EO%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <span class="brand-mark">O</span>
        <div>
          <h1>오카리나 운지 코치</h1>
          <p>12홀 횡형 · 에어 모드</p>
        </div>
      </div>
      <div class="toolbar">
        <label>
          <span>종류</span>
          <select id="typeSelect"></select>
        </label>
        <button id="cameraButton" type="button">카메라 시작</button>
        <button id="calibrationButton" type="button">캘리브레이션</button>
        <button id="clearCalibrationButton" type="button" class="ghost">초기화</button>
      </div>
    </header>

    <main class="workspace">
      <section class="camera-panel" aria-label="카메라와 손 추적">
        <div class="video-stage">
          <video id="camera" playsinline muted></video>
          <canvas id="overlay"></canvas>
          <div class="stage-empty">
            <strong>카메라를 시작하세요</strong>
            <span>양손 끝이 보이도록 화면 안에 크게 들어오게 합니다</span>
          </div>
        </div>
        <div class="status-row">
          <span id="cameraStatus">카메라 대기</span>
          <span id="trackingStatus">손 추적 대기</span>
          <span id="calibrationStatus">캘리브레이션 확인 중</span>
        </div>
        <div id="cameraGuidePanel" class="camera-guide" data-level="idle" aria-live="polite"></div>
        <div id="fingerState" class="finger-state" aria-label="감지된 손가락 상태"></div>
      </section>

      <section class="coach-panel" aria-label="운지 도식과 피드백">
        <div class="control-strip">
          <div id="thumbControls" class="thumb-controls" aria-label="엄지 수동 토글">
            <button type="button" data-thumb="L1" aria-pressed="true"></button>
            <button type="button" data-thumb="R1" aria-pressed="true"></button>
          </div>
          <label class="toggle">
            <input id="voiceToggle" type="checkbox" />
            <span>음성</span>
          </label>
          <label class="toggle">
            <input id="autoNext" type="checkbox" checked />
            <span>자동 다음</span>
          </label>
          <button id="diagnosticsToggle" type="button" class="ghost icon-toggle" aria-pressed="false">진단</button>
        </div>

        <div id="diagram" class="diagram"></div>

        <div class="note-picker">
          <div class="note-picker-head">
            <h2>음 선택</h2>
            <button id="nextButton" type="button" class="ghost">다음 음</button>
          </div>
          <div id="noteButtons" class="note-buttons"></div>
        </div>

        <div id="feedback" class="feedback" data-status="idle"></div>
        <div id="holdProgress" class="hold-progress" aria-hidden="true"></div>
        <div id="diagnosticsPanel" class="diagnostics-panel" hidden></div>
      </section>
    </main>

    <aside class="limits">
      <strong>MVP 한계</strong>
      <span>입김은 카메라로 감지하지 않으며, 뒷면 엄지와 반구멍은 안내 또는 수동 토글로 처리합니다.</span>
    </aside>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
