<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>운지 데이터 검증</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%230b7f7a'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-size='18' font-family='Arial' font-weight='800' fill='white'%3EV%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      body {
        padding: 22px;
      }
      .verify-list {
        display: grid;
        gap: 18px;
      }
      .verify-item {
        display: grid;
        grid-template-columns: minmax(320px, 1fr) minmax(320px, 1fr);
        gap: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
        background: #fff;
      }
      .verify-item h2 {
        margin: 0 0 8px;
      }
      object {
        width: 100%;
        min-height: 340px;
        border: 1px solid var(--line);
        border-radius: 8px;
      }
      @media (max-width: 820px) {
        .verify-item {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <span class="brand-mark">V</span>
        <div>
          <h1>운지 데이터 검증</h1>
          <p>생성 도식과 원본 SVG를 나란히 비교합니다</p>
        </div>
      </div>
    </header>
    <main id="verifyList" class="verify-list"></main>
    <script type="module">
      import { NOTES_12 } from "./src/ocarinaData.js";
      import { renderDiagram } from "./src/diagram.js";

      const list = document.querySelector("#verifyList");
      list.innerHTML = NOTES_12.map(
        (note) => `
          <article class="verify-item">
            <section>
              <h2>${note.label} · ${note.pitch}</h2>
              <div id="diagram-${note.id}" class="diagram"></div>
            </section>
            <section>
              <h2>원본 SVG</h2>
              <object data="../01 Source/ocarina_fingering_charts_by_type(Claude)[All]/음별_20/${note.id}.svg" type="image/svg+xml"></object>
            </section>
          </article>
        `,
      ).join("");

      for (const note of NOTES_12) {
        renderDiagram(document.querySelector(`#diagram-${note.id}`), note, {}, {});
      }
    </script>
  </body>
</html>
