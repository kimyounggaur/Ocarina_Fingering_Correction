<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 794 1123" width="210mm" height="297mm" font-family="Noto Sans CJK KR, sans-serif"><rect width="794" height="1123" fill="#FAF6EF"/><rect x="0" y="0" width="794" height="8" fill="#2E5AAC"/><text x="48" y="62" font-size="30" font-weight="800" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">오카리나 종류별 운지표</text><text x="48" y="90" font-size="16" fill="#8A8378" font-family="Noto Sans CJK KR, sans-serif">Ocarina Fingering Charts by Type</text><rect x="48" y="120" width="698" height="150" rx="20" fill="#fff" stroke="#ECE4D6" stroke-width="2"/><text x="72" y="186" font-size="40" font-weight="800" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">오카리나 운지표</text><text x="74" y="226" font-size="19" fill="#8A8378" font-family="Noto Sans CJK KR, sans-serif">12공 알토 C 기준 · 온음 12 + 반음 8 + 종류별 변환 + 6공 펜던트</text><text x="74" y="252" font-size="15" fill="#2E5AAC" font-family="Noto Sans CJK KR, sans-serif">한국 교재 표준 표기 (왼손 핑크 ● / 오른손 검정 ● / 열기 ○)</text><rect x="48" y="296" width="698" height="86" rx="16" fill="#fff" stroke="#ECE4D6" stroke-width="2"/><text x="72" y="328" font-size="18" font-weight="800" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">기호 보는 법</text><g transform="translate(72,338) scale(1.0)" font-family="Noto Sans CJK KR, sans-serif"><circle cx="11" cy="11" r="11" fill="#E0407B"/><text x="30" y="17" font-size="17" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">막기 · 왼손</text><circle cx="184" cy="11" r="11" fill="#37474F"/><text x="203" y="17" font-size="17" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">막기 · 오른손</text><circle cx="374" cy="11" r="11" fill="#fff" stroke="#B0A89B" stroke-width="2"/><text x="393" y="17" font-size="17" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">열기</text><clipPath id="lg454"><rect x="454" y="0" width="22" height="11"/></clipPath><circle cx="465" cy="11" r="11" fill="#fff" stroke="#B0A89B" stroke-width="2"/><circle cx="465" cy="11" r="11" fill="#E0407B" clip-path="url(#lg454)"/><text x="484" y="17" font-size="17" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">반만 막기</text></g><rect x="48" y="402" width="698" height="392" rx="16" fill="#fff" stroke="#ECE4D6" stroke-width="2"/><text x="72" y="438" font-size="18" font-weight="800" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">구멍 이름과 손가락 번호</text><text x="72" y="462" font-size="15" fill="#8A8378" font-family="Noto Sans CJK KR, sans-serif">엄지=1 · 검지=2 · 중지=3 · 약지=4 · 새끼=5   (L=왼손, R=오른손, S=보조구멍, T=엄지)</text><text x="72" y="492" font-size="15" fill="#2E5AAC" font-weight="700" font-family="Noto Sans CJK KR, sans-serif">앞면 (구멍 10개)</text><svg x="52" y="500" width="440" height="230" viewBox="0 0 460 340"><defs><linearGradient id="g67247front" x1="0" y1="0" x2="0.15" y2="1"><stop offset="0" stop-color="#E7A877"/><stop offset="1" stop-color="#C97B4A"/></linearGradient><pattern id="h67247" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse"><rect width="6" height="6" fill="#E9E7E0"/><line x1="0" y1="0" x2="0" y2="6" stroke="#6B7A66" stroke-width="2"/></pattern></defs><path d="M 150 120 C 150 70 250 56 350 60 C 470 64 600 92 720 130 C 800 156 858 196 862 232 C 862 256 828 270 770 274 C 660 282 520 288 410 296 C 320 302 250 300 206 296 L 196 330 C 194 360 150 364 132 352 C 116 340 116 300 138 286 C 150 278 156 250 150 224 C 132 200 120 160 150 120 Z" fill="url(#g67247front)" stroke="#A2592E" stroke-width="3.5" stroke-linejoin="round"/><ellipse cx="330" cy="120" rx="180" ry="34" fill="#FFFFFF" opacity="0.14"/><circle cx="228" cy="150" r="13" fill="#FFFFFF" stroke="#B0A89B" stroke-width="2"/><text x="228" y="131" font-size="26" text-anchor="middle" fill="#8A8378" font-weight="800" font-family="Noto Sans CJK KR, sans-serif">L5</text><circle cx="315" cy="126" r="17" fill="#FFFFFF" stroke="#B0A89B" stroke-width="2"/><text x="315" y="103" font-size="26" text-anchor="middle" fill="#8A8378" font-weight="800" font-family="Noto Sans CJK KR, sans-serif">L4</text><circle cx="402" cy="114" r="19" fill="#FFFFFF" stroke="#B0A89B" stroke-width="2"/><text x="402" y="89" font-size="26" text-anchor="middle" fill="#8A8378" font-weight="800" font-family="Noto Sans CJK KR, sans-serif">L3</text><circle cx="487" cy="118" r="18" fill="#FFFFFF" stroke="#B0A89B" stroke-width="2"/><text x="487" y="94" font-size="26" text-anchor="middle" fill="#8A8378" font-weight="800" font-family="Noto Sans CJK KR, sans-serif">L2</text><circle cx="516" cy="166" r="8" fill="#FFFFFF" stroke="#B0A89B" stroke-width="2"/><text x="516" y="152" font-size="26" text-anchor="middle" fill="#8A8378" font-weight="800" font-family="Noto Sans CJK KR, sans-serif">LS</text><circle cx="582" cy="178" r="19" fill="#FFFFFF" stroke="#B0A89B" stroke-width="2"/><text x="582" y="153" font-size="26" text-anchor="middle" fill="#8A8378" font-weight="800" font-family="Noto Sans CJK KR, sans-serif">R2</text><circle cx="660" cy="190" r="18" fill="#FFFFFF" stroke="#B0A89B" stroke-width="2"/><text x="660" y="166" font-size="26" text-anchor="middle" fill="#8A8378" font-weight="800" font-family="Noto Sans CJK KR, sans-serif">R3</text><circle cx="732" cy="200" r="15" fill="#FFFFFF" stroke="#B0A89B" stroke-width="2"/><text x="732" y="179" font-size="26" text-anchor="middle" fill="#8A8378" font-weight="800" font-family="Noto Sans CJK KR, sans-serif">R4</text><circle cx="796" cy="206" r="13" fill="#FFFFFF" stroke="#B0A89B" stroke-width="2"/><text x="796" y="187" font-size="26" text-anchor="middle" fill="#8A8378" font-weight="800" font-family="Noto Sans CJK KR, sans-serif">R5</text><circle cx="765" cy="242" r="8" fill="#FFFFFF" stroke="#B0A89B" stroke-width="2"/><text x="765" y="228" font-size="26" text-anchor="middle" fill="#8A8378" font-weight="800" font-family="Noto Sans CJK KR, sans-serif">RS</text></svg><text x="512" y="540" font-size="15" fill="#2E5AAC" font-weight="700" font-family="Noto Sans CJK KR, sans-serif">뒷면</text><svg x="508" y="548" width="224" height="117" viewBox="0 0 460 340"><defs><linearGradient id="g6412back" x1="0" y1="0" x2="0.15" y2="1"><stop offset="0" stop-color="#E7A877"/><stop offset="1" stop-color="#C97B4A"/></linearGradient><pattern id="h6412" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse"><rect width="6" height="6" fill="#E9E7E0"/><line x1="0" y1="0" x2="0" y2="6" stroke="#6B7A66" stroke-width="2"/></pattern></defs><path d="M 750 120 C 750 70 650 56 550 60 C 430 64 300 92 180 130 C 100 156 42 196 38 232 C 38 256 72 270 130 274 C 240 282 380 288 490 296 C 580 302 650 300 694 296 L 704 330 C 706 360 750 364 768 352 C 784 340 784 300 762 286 C 750 278 744 250 750 224 C 768 200 780 160 750 120 Z" fill="url(#g6412back)" stroke="#A2592E" stroke-width="3.5" stroke-linejoin="round"/><ellipse cx="560" cy="120" rx="180" ry="34" fill="#FFFFFF" opacity="0.14"/><ellipse cx="660" cy="268" rx="26" ry="12" fill="url(#h6412)" stroke="#6B7A66" stroke-width="2.5"/><text x="660" y="300" font-size="22" text-anchor="middle" fill="#6B7A66" font-weight="700" font-family="Noto Sans CJK KR, sans-serif">노래구멍·막지않음</text><circle cx="360" cy="224" r="19" fill="#FFFFFF" stroke="#B0A89B" stroke-width="2"/><text x="360" y="199" font-size="26" text-anchor="middle" fill="#8A8378" font-weight="800" font-family="Noto Sans CJK KR, sans-serif">RT</text><circle cx="606" cy="172" r="21" fill="#FFFFFF" stroke="#B0A89B" stroke-width="2"/><text x="606" y="145" font-size="26" text-anchor="middle" fill="#8A8378" font-weight="800" font-family="Noto Sans CJK KR, sans-serif">LT</text></svg><text x="620" y="690" font-size="13.5" fill="#8A8378" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">왼손 엄지 LT · 오른손 엄지 RT</text><text x="262" y="772" font-size="14" fill="#8A8378" font-family="Noto Sans CJK KR, sans-serif">L5 L4 L3 L2 = 왼손, R2 R3 R4 R5 = 오른손, LS·RS = 보조구멍</text><rect x="48" y="812" width="698" height="232" rx="16" fill="#FFF7E8" stroke="#E8A53C" stroke-width="2"/><text x="72" y="848" font-size="18" font-weight="800" fill="#7a5a16" font-family="Noto Sans CJK KR, sans-serif">운지표 한 장으로 모든 종류를 본다</text><text x="72" y="884" font-size="15.5" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">• 12공 오카리나는 소프라노·알토·베이스, C·G·F조가 모두 같은 운지·같은 계이름을 씁니다.</text><text x="72" y="914" font-size="15.5" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">• 악기의 조와 음역에 따라 &quot;실제로 들리는 음높이&quot;만 평행이동할 뿐입니다. (3쪽 변환표 참고)</text><text x="72" y="944" font-size="15.5" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">• 막은 구멍의 &quot;전체 면적&quot;이 음높이를 정합니다 → 같은 음도 악기마다 미세 운지가 다를 수 있어요.</text><text x="72" y="974" font-size="15.5" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">• 6공 펜던트는 교차운지를 쓰는 다른 계열입니다. 제조사 차트를 우선하세요. (4쪽 참고)</text><text x="72" y="1004" font-size="15.5" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">• 반음(♯·♭)과 높은 도♯/레♯/미는 고급 단계 — 처음에는 온음 12개부터 익히세요.</text><text x="48" y="1095" font-size="12" fill="#8A8378" font-family="Noto Sans CJK KR, sans-serif">오카리나 종류별 운지표 · 12공 알토 C</text><text x="746" y="1095" font-size="12" fill="#8A8378" text-anchor="end" font-family="Noto Sans CJK KR, sans-serif">1 / 6</text></svg>