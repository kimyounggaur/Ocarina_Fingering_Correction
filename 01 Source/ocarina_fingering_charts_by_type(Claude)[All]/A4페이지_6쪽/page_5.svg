<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 794 1123" width="210mm" height="297mm" font-family="Noto Sans CJK KR, sans-serif"><rect width="794" height="1123" fill="#FAF6EF"/><rect x="0" y="0" width="794" height="8" fill="#2E5AAC"/><text x="48" y="62" font-size="30" font-weight="800" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">6공 펜던트 오카리나 (참고)</text><text x="48" y="90" font-size="16" fill="#8A8378" font-family="Noto Sans CJK KR, sans-serif">Pendant Ocarina · 다른 운지 계열</text><svg x="48" y="150" width="420" height="286" viewBox="0 0 440 300"><defs><radialGradient id="pg" cx="0.4" cy="0.35" r="0.8"><stop offset="0" stop-color="#8fb0c8"/><stop offset="1" stop-color="#4f7a98"/></radialGradient></defs><path d="M 220 36 C 320 36 392 96 392 168 C 392 236 326 270 232 270 C 150 270 96 232 84 188 L 40 168 L 84 150 C 100 104 140 36 220 36 Z" fill="url(#pg)" stroke="#2f5066" stroke-width="3.5" stroke-linejoin="round"/><ellipse cx="200" cy="96" rx="120" ry="30" fill="#fff" opacity="0.16"/><text x="40" y="150" font-size="13" fill="#2f5066" text-anchor="end" font-family="Noto Sans CJK KR, sans-serif">취구</text><circle cx="170" cy="150" r="18" fill="#E0407B" stroke="#00000022"/><circle cx="150" cy="205" r="15" fill="#E0407B" stroke="#00000022"/><circle cx="262" cy="150" r="18" fill="#37474F" stroke="#00000022"/><circle cx="282" cy="205" r="15" fill="#37474F" stroke="#00000022"/><text x="160" y="118" font-size="14" fill="#E0407B" font-weight="700" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">왼손 2</text><text x="272" y="118" font-size="14" fill="#37474F" font-weight="700" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">오른손 2</text><circle cx="196" cy="244" r="13" fill="none" stroke="#2f5066" stroke-width="2" stroke-dasharray="4 4"/><circle cx="250" cy="244" r="13" fill="none" stroke="#2f5066" stroke-width="2" stroke-dasharray="4 4"/><text x="223" y="290" font-size="13" fill="#2f5066" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">뒷면 엄지구멍 2 (점선)</text></svg><rect x="486" y="140" width="260" height="300" rx="16" fill="#fff" stroke="#ECE4D6" stroke-width="2"/><text x="508" y="174" font-size="18" font-weight="800" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">6공 펜던트란?</text><text x="508" y="204" font-size="14.5" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">• 앞면 4구멍 + 뒷면 엄지 2구멍</text><text x="508" y="228" font-size="14.5" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">  = 모두 6구멍.</text><text x="508" y="252" font-size="14.5" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif"></text><text x="508" y="276" font-size="14.5" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">• 12공(트랜스버스)과 달리</text><text x="508" y="300" font-size="14.5" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">  &quot;교차운지&quot;로 음계를 만듭니다.</text><text x="508" y="324" font-size="14.5" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif"></text><text x="508" y="348" font-size="14.5" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">• 음역은 보통 1옥타브 남짓의</text><text x="508" y="372" font-size="14.5" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">  온음계(도~높은도).</text><text x="508" y="396" font-size="14.5" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif"></text><text x="508" y="420" font-size="14.5" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">• 엄지 2구멍은 높은 음을</text><text x="508" y="444" font-size="14.5" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">  더 내기 위한 구멍입니다.</text><rect x="48" y="470" width="698" height="150" rx="16" fill="#FFF7E8" stroke="#E8A53C" stroke-width="2"/><text x="72" y="504" font-size="18" font-weight="800" fill="#7a5a16" font-family="Noto Sans CJK KR, sans-serif">⚠ 6공 운지는 제조사마다 다릅니다</text><text x="72" y="538" font-size="14.5" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">펜던트(6공)는 같은 음이라도 메이커마다 교차운지 조합이 다릅니다. 면적으로 음을 만드는 악기 특성상,</text><text x="72" y="564" font-size="14.5" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">다른 차트의 운지를 그대로 쓰면 음정이 틀어질 수 있습니다. 반드시 악기에 동봉된 차트 또는</text><text x="72" y="590" font-size="14.5" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">제조사 공식 차트(STL Ocarina, Songbird, Ace Ocarinas 등)를 우선 사용하세요. 이 문서는</text><text x="72" y="616" font-size="14.5" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">구조·원리 이해용 참고이며, 6공의 음별 운지 조합은 의도적으로 싣지 않았습니다.</text><text x="48" y="672" font-size="18" font-weight="800" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">6공 vs 12공 한눈 비교</text><rect x="48" y="690" width="698" height="42" fill="#2E5AAC" stroke="#ECE4D6"/><text x="62" y="717" font-size="14.5" fill="#fff" font-weight="700" font-family="Noto Sans CJK KR, sans-serif">구분</text><text x="212" y="717" font-size="14.5" fill="#fff" font-weight="700" font-family="Noto Sans CJK KR, sans-serif">6공 펜던트</text><text x="442" y="717" font-size="14.5" fill="#fff" font-weight="700" font-family="Noto Sans CJK KR, sans-serif">12공 트랜스버스(이 문서 주제)</text><rect x="48" y="732" width="698" height="42" fill="#fff" stroke="#ECE4D6"/><text x="62" y="759" font-size="14.5" fill="#2B2B2B" font-weight="700" font-family="Noto Sans CJK KR, sans-serif">운지 방식</text><text x="212" y="759" font-size="14.5" fill="#8A8378" font-weight="400" font-family="Noto Sans CJK KR, sans-serif">교차운지(cross)</text><text x="442" y="759" font-size="14.5" fill="#8A8378" font-weight="400" font-family="Noto Sans CJK KR, sans-serif">순차 + 보조구멍/엄지</text><rect x="48" y="774" width="698" height="42" fill="#F6F1E8" stroke="#ECE4D6"/><text x="62" y="801" font-size="14.5" fill="#2B2B2B" font-weight="700" font-family="Noto Sans CJK KR, sans-serif">음역</text><text x="212" y="801" font-size="14.5" fill="#8A8378" font-weight="400" font-family="Noto Sans CJK KR, sans-serif">약 1옥타브 온음계</text><text x="442" y="801" font-size="14.5" fill="#8A8378" font-weight="400" font-family="Noto Sans CJK KR, sans-serif">약 1.5옥타브 + 반음(반음계)</text><rect x="48" y="816" width="698" height="42" fill="#fff" stroke="#ECE4D6"/><text x="62" y="843" font-size="14.5" fill="#2B2B2B" font-weight="700" font-family="Noto Sans CJK KR, sans-serif">구멍</text><text x="212" y="843" font-size="14.5" fill="#8A8378" font-weight="400" font-family="Noto Sans CJK KR, sans-serif">앞 4 + 엄지 2</text><text x="442" y="843" font-size="14.5" fill="#8A8378" font-weight="400" font-family="Noto Sans CJK KR, sans-serif">앞 10 + 엄지 2 (보조 2 포함)</text><rect x="48" y="858" width="698" height="42" fill="#F6F1E8" stroke="#ECE4D6"/><text x="62" y="885" font-size="14.5" fill="#2B2B2B" font-weight="700" font-family="Noto Sans CJK KR, sans-serif">난이도</text><text x="212" y="885" font-size="14.5" fill="#8A8378" font-weight="400" font-family="Noto Sans CJK KR, sans-serif">입문에 쉬움</text><text x="442" y="885" font-size="14.5" fill="#8A8378" font-weight="400" font-family="Noto Sans CJK KR, sans-serif">표현 폭 넓음(학교·교재 표준)</text><rect x="48" y="900" width="698" height="42" fill="#fff" stroke="#ECE4D6"/><text x="62" y="927" font-size="14.5" fill="#2B2B2B" font-weight="700" font-family="Noto Sans CJK KR, sans-serif">운지 표준화</text><text x="212" y="927" font-size="14.5" fill="#8A8378" font-weight="400" font-family="Noto Sans CJK KR, sans-serif">제조사별 상이</text><text x="442" y="927" font-size="14.5" fill="#8A8378" font-weight="400" font-family="Noto Sans CJK KR, sans-serif">대체로 표준(이 문서)</text><text x="48" y="1095" font-size="12" fill="#8A8378" font-family="Noto Sans CJK KR, sans-serif">오카리나 종류별 운지표 · 12공 알토 C</text><text x="746" y="1095" font-size="12" fill="#8A8378" text-anchor="end" font-family="Noto Sans CJK KR, sans-serif">6 / 6</text></svg>