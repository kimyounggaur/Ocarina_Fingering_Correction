<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 794 1123" width="210mm" height="297mm" font-family="Noto Sans CJK KR, sans-serif"><rect width="794" height="1123" fill="#FAF6EF"/><rect x="0" y="0" width="794" height="8" fill="#2E5AAC"/><text x="48" y="62" font-size="30" font-weight="800" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">종류별 운지·음높이 변환</text><text x="48" y="90" font-size="16" fill="#8A8378" font-family="Noto Sans CJK KR, sans-serif">소프라노 · 알토 · 베이스 × C · G · F</text><rect x="48" y="118" width="698" height="120" rx="16" fill="#EAF1FB" stroke="#2E5AAC" stroke-width="2"/><text x="72" y="152" font-size="20" font-weight="800" fill="#1c3c78" font-family="Noto Sans CJK KR, sans-serif">핵심: 운지는 하나, 음높이만 달라진다</text><text x="72" y="184" font-size="16" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">같은 손가락 모양 = 같은 계이름(도레미). 악기의 &quot;조&quot;는 &quot;도&quot;가 어느 음으로 들리는지를,</text><text x="72" y="212" font-size="16" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">&quot;음역&quot;은 전체가 몇 옥타브에 놓이는지를 정합니다. 아래 두 표를 곱하면 종류별 음높이가 나옵니다.</text><text x="48" y="288" font-size="18" font-weight="800" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">① 조(Key) — "도" 운지가 내는 실제 음</text><rect x="48" y="300" width="698" height="40" fill="#2E5AAC"/><text x="164.33333333333331" y="326" font-size="15.5" font-weight="700" fill="#fff" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">악기 조</text><text x="396.99999999999994" y="326" font-size="15.5" font-weight="700" fill="#fff" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">&#x27;도&#x27; 운지 → 들리는 음</text><text x="629.6666666666666" y="326" font-size="15.5" font-weight="700" fill="#fff" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">C조 대비</text><rect x="48" y="340" width="698" height="40" fill="#FFF2D6" stroke="#ECE4D6"/><text x="164.33333333333331" y="366" font-size="15" fill="#2B2B2B" font-weight="700" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">C조</text><text x="396.99999999999994" y="366" font-size="15" fill="#8A8378" font-weight="400" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">도 (C)</text><text x="629.6666666666666" y="366" font-size="15" fill="#8A8378" font-weight="400" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">기준</text><rect x="48" y="380" width="698" height="40" fill="#F6F1E8" stroke="#ECE4D6"/><text x="164.33333333333331" y="406" font-size="15" fill="#2B2B2B" font-weight="700" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">D조</text><text x="396.99999999999994" y="406" font-size="15" fill="#8A8378" font-weight="400" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">레 (D)</text><text x="629.6666666666666" y="406" font-size="15" fill="#8A8378" font-weight="400" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">장2도 위</text><rect x="48" y="420" width="698" height="40" fill="#fff" stroke="#ECE4D6"/><text x="164.33333333333331" y="446" font-size="15" fill="#2B2B2B" font-weight="700" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">F조</text><text x="396.99999999999994" y="446" font-size="15" fill="#8A8378" font-weight="400" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">파 (F)</text><text x="629.6666666666666" y="446" font-size="15" fill="#8A8378" font-weight="400" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">완전4도 위</text><rect x="48" y="460" width="698" height="40" fill="#F6F1E8" stroke="#ECE4D6"/><text x="164.33333333333331" y="486" font-size="15" fill="#2B2B2B" font-weight="700" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">G조</text><text x="396.99999999999994" y="486" font-size="15" fill="#8A8378" font-weight="400" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">솔 (G)</text><text x="629.6666666666666" y="486" font-size="15" fill="#8A8378" font-weight="400" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">완전5도 위</text><rect x="48" y="500" width="698" height="40" fill="#fff" stroke="#ECE4D6"/><text x="164.33333333333331" y="526" font-size="15" fill="#2B2B2B" font-weight="700" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">A조</text><text x="396.99999999999994" y="526" font-size="15" fill="#8A8378" font-weight="400" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">라 (A)</text><text x="629.6666666666666" y="526" font-size="15" fill="#8A8378" font-weight="400" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">장6도 위</text><text x="48" y="572" font-size="18" font-weight="800" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">② 음역(Register) — 전체 음역의 옥타브 (C조 기준 범위)</text><rect x="48" y="584" width="698" height="40" fill="#2E5AAC"/><text x="164.33333333333331" y="610" font-size="15.5" font-weight="700" fill="#fff" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">음역</text><text x="396.99999999999994" y="610" font-size="15.5" font-weight="700" fill="#fff" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">알토 대비</text><text x="629.6666666666666" y="610" font-size="15.5" font-weight="700" fill="#fff" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">낮은라~높은미</text><rect x="48" y="624" width="698" height="40" fill="#fff" stroke="#ECE4D6"/><text x="164.33333333333331" y="650" font-size="15" fill="#2B2B2B" font-weight="700" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">소프라노</text><text x="396.99999999999994" y="650" font-size="15" fill="#8A8378" font-weight="400" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">1옥타브 위</text><text x="629.6666666666666" y="650" font-size="15" fill="#8A8378" font-weight="400" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">A5 → E7</text><rect x="48" y="664" width="698" height="40" fill="#FFF2D6" stroke="#ECE4D6"/><text x="164.33333333333331" y="690" font-size="15" fill="#2B2B2B" font-weight="700" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">알토 (기준)</text><text x="396.99999999999994" y="690" font-size="15" fill="#8A8378" font-weight="400" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">기준</text><text x="629.6666666666666" y="690" font-size="15" fill="#8A8378" font-weight="400" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">A4 → E6</text><rect x="48" y="704" width="698" height="40" fill="#fff" stroke="#ECE4D6"/><text x="164.33333333333331" y="730" font-size="15" fill="#2B2B2B" font-weight="700" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">베이스</text><text x="396.99999999999994" y="730" font-size="15" fill="#8A8378" font-weight="400" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">1옥타브 아래</text><text x="629.6666666666666" y="730" font-size="15" fill="#8A8378" font-weight="400" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">A3 → E5</text><rect x="48" y="744" width="698" height="40" fill="#F6F1E8" stroke="#ECE4D6"/><text x="164.33333333333331" y="770" font-size="15" fill="#2B2B2B" font-weight="700" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">콘트라베이스</text><text x="396.99999999999994" y="770" font-size="15" fill="#8A8378" font-weight="400" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">2옥타브 아래</text><text x="629.6666666666666" y="770" font-size="15" fill="#8A8378" font-weight="400" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif">A2 → E4</text><rect x="48" y="806" width="698" height="150" rx="16" fill="#fff" stroke="#ECE4D6" stroke-width="2"/><text x="72" y="846" font-size="17" font-weight="800" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">예시</text><text x="72" y="876" font-size="15" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">• 알토 C에서 &quot;도&quot; 운지 → C5 소리.   소프라노 C에서 같은 운지 → C6 (한 옥타브 위).</text><text x="72" y="902" font-size="15" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">• 알토 G에서 &quot;도&quot; 운지 → G 소리(5도 위). 계이름·손가락은 알토 C와 완전히 동일.</text><text x="72" y="928" font-size="15" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">• 그래서 합주가 가능합니다: 모두 &quot;도&quot;를 짚으면, 악기별로 C·G·F… 화음이 쌓입니다.</text><text x="72" y="954" font-size="15" fill="#2B2B2B" font-family="Noto Sans CJK KR, sans-serif">• 운지표(이 문서 1~4쪽)는 종류와 무관하게 그대로 쓰고, 들리는 음만 위 표로 환산하세요.</text><text x="48" y="1004" font-size="13" fill="#8A8378" font-family="Noto Sans CJK KR, sans-serif">* G·F조의 정확한 옥타브는 음역(소프라노/알토/베이스)에 따릅니다. 트리플·더블 오카리나는 각 관마다 위 운지를 반복 적용합니다.</text><text x="48" y="1095" font-size="12" fill="#8A8378" font-family="Noto Sans CJK KR, sans-serif">오카리나 종류별 운지표 · 12공 알토 C</text><text x="746" y="1095" font-size="12" fill="#8A8378" text-anchor="end" font-family="Noto Sans CJK KR, sans-serif">5 / 6</text></svg>